services:
  db:
    image: pgvector/pgvector:pg16
    container_name: hrms_ai_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hrms_ai}
      POSTGRES_USER: ${POSTGRES_USER:-hrms_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hrms_ai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - hrms_ai_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hrms_ai} -d ${POSTGRES_DB:-hrms_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hrms_ai_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - hrms_ai_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  hrms_ai_pgdata:
  hrms_ai_redisdata:
